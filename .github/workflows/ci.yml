name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Lint (ruff check)
        run: uv run ruff check src/ tests/ devtools/

      - name: Format check (ruff format)
        run: uv run ruff format src/ tests/ devtools/ --check

      - name: Type check (ty)
        run: uv run ty check src/

      - name: Spell check (codespell)
        run: uv run codespell --write-changes src/ tests/ devtools/

      - name: Security scan (bandit)
        run: uv run bandit -c pyproject.toml -r src/ tests/ devtools/

      - name: Test
        run: uv run pytest
